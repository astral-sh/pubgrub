name: CI
on:
  pull_request:
  merge_group:
  push:
    branches: [release, dev]
  schedule: [cron: "0 6 * * 4"]

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - run: cargo build --workspace

      - run: cargo test --all-features --workspace

  test-i686:
    name: Tests (32-bit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: | 
          sudo apt-get update
          sudo apt-get install -y gcc-multilib
      - run: rustup target add i686-unknown-linux-gnu
      - run: cargo build --workspace --target i686-unknown-linux-gnu
      - run: cargo test --all-features --workspace --target i686-unknown-linux-gnu

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Check Clippy lints
        env:
          RUSTFLAGS: -D warnings
        run: cargo clippy --workspace

  check_formatting:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - run: cargo fmt --all -- --check

  check_documentation:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --document-private-items

  minimal-versions:
    name: Minimal versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - run: rustup toolchain install nightly

      - run: cargo +nightly update -Zminimal-versions

      - run: cargo +nightly build --workspace

      - run: cargo +nightly test --all-features --workspace

  minimal-rust-version:
    name: Minimum Rust version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # NOTE: Keep in sync with `Cargo.toml`
      - run: rustup toolchain install 1.92

      - run: cargo +1.92 test --all-features --workspace
